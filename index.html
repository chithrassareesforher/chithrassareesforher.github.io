---
layout: default
---

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title }}</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: {{ site.theme_colors.background }}; color: {{ site.theme_colors.text }}; margin: 0; padding: 0; }
        header { background: linear-gradient(135deg, {{ site.theme_colors.primary }}, {{ site.theme_colors.secondary }}); padding: 40px 20px; text-align: center; color: #fff; }
        header h1 { margin: 0; font-size: 2.5em; letter-spacing: 1px; font-family: 'Georgia', serif; text-shadow: 1px 1px 3px rgba(0,0,0,0.2); }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .card { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: transform 0.2s; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 350px; object-fit: cover; }
        .card-content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card h3 { margin: 0 0 10px 0; font-size: 1.3em; color: {{ site.theme_colors.text }}; }
        .price { font-size: 1.2em; font-weight: bold; color: #b57c82; margin-bottom: 15px; }
        .btn-whatsapp { display: block; text-align: center; background-color: #25D366; color: white; padding: 10px; border-radius: 5px; text-decoration: none; font-weight: bold; transition: background 0.2s; }
        .btn-whatsapp:hover { background-color: #128C7E; }
    </style>
</head>
<body>

    <header>
        <h1>Chithra's Sarees For Her</h1>
        <p>Elegance woven into every thread</p>
    </header>

    <div class="container">
        <div class="grid">
            {% for item in site.data.products %}
            <div class="card">
                <img src="{{ item.image_link }}" alt="{{ item.title }}">
                <div class="card-content">
                    <div>
                        <h3>{{ item.title }}</h3>
                        <p style="font-size: 0.9em; color: #666;">{{ item.description }}</p>
                    </div>
                    <div>
                        <div class="price">₹{{ item.price | split: ' ' | first }}</div>
                        <!-- Direct WhatsApp Order Trigger -->
                        <a href="https://wa.me/91XXXXXXXXXX?text=Hi,%20I%20am%20interested%20in%20buying%20{{ item.title | url_encode }}%20(ID:%20{{ item.id }})." class="btn-whatsapp" target="_blank">Order via WhatsApp</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
