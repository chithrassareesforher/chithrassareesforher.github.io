backend:
  name: git-gateway
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "products"
    label: "Sarees Catalog"
    delete: true
    editor:
      preview: false # Disables raw code preview to keep it clean
    files:
      - name: "sarees"
        label: "Inventory List"
        file: "_data/products.yml"
        description: "Add, edit, or remove sarees from your live online storefront."
        fields:
          - label: "Saree Items"
            name: "items"
            widget: "list"
            allow_add: true
            fields:
              - { label: "Product ID (e.g., SAREE-001)", name: "id", widget: "string" }
              - { label: "Saree Title/Name", name: "title", widget: "string" }
              - { label: "Price (e.g., 2999 INR)", name: "price", widget: "string" }
              - { label: "Color/Shade", name: "color", widget: "string" }
              - { label: "Condition", name: "condition", widget: "select", options: ["new", "featured", "sale"] }
              - { label: "Availability", name: "availability", widget: "select", options: ["in stock", "out of stock"] }
              - { label: "Product Image", name: "image_link", widget: "image" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "WhatsApp Redirect Link", name: "link", widget: "hidden", default: "/" }
              - { label: "Brand", name: "brand", widget: "hidden", default: "Chithra's Sarees for Her" }
